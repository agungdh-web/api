name: Docker

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_GHCR: ${{ github.repository }}
  IMAGE_DOCKERHUB: agungdh/agungdh-web_api

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_GHCR }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_DOCKERHUB }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set GHCR package visibility to public
        if: github.event_name != 'pull_request'
        env:
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ github.event.repository.name }}
        run: |
          OWNER_TYPE=$(gh api "repos/${OWNER}/${PACKAGE}" --jq '.owner.type')
          if [ "$OWNER_TYPE" = "Organization" ]; then
            ENDPOINT="orgs/${OWNER}/packages/container/${PACKAGE}"
          else
            ENDPOINT="user/packages/container/${PACKAGE}"
          fi
          for i in $(seq 1 10); do
            if gh api -X PATCH "$ENDPOINT" -f visibility=public; then
              echo "GHCR package visibility set to public"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Failed to set visibility after 10 attempts"
          exit 1
